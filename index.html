<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan AI - Market Analysis</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #151a26;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #262f45;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #00e676;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 12px;
            color: #8a96a3;
            margin-bottom: 25px;
        }
        .card {
            background: #1c2434;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #00e676;
            text-align: left;
        }
        .label {
            font-size: 11px;
            color: #8a96a3;
            text-transform: uppercase;
        }
        .value {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #fff;
        }
        .signal {
            font-size: 22px;
            font-weight: 800;
            color: #00e676;
        }
        .btn {
            background-color: #00e676;
            color: #000;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #00b357;
        }
        .loading {
            font-size: 16px;
            color: #00e676;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Titan AI Analysis</h1>
    <div class="subtitle">Live Market News & Signal Dashboard</div>

    <div id="loading" class="loading">Analyzing Market Data...</div>

    <div id="dashboard">
        <div class="card">
            <div class="label">Asset Pair</div>
            <div id="asset" class="value">---</div>

            <div class="label">Economic Event</div>
            <div id="event" class="value">---</div>

            <!-- নতুন যোগ করা ডেট ও টাইম এরিয়া -->
            <div class="label">News Date & Time</div>
            <div id="time" class="value" style="color: #2979ff;">---</div>

            <div class="label">AI Recommendation</div>
            <div id="direction" class="signal">---</div>
            
            <div class="label" style="margin-top:10px;">Accuracy Confidence</div>
            <div id="confidence" class="value" style="color: #ffb300;">---</div>
        </div>

        <div class="card" style="border-left: 5px solid #2979ff;">
            <div class="label">AI Market Insight</div>
            <div id="insight" class="value" style="font-size: 14px; font-weight: normal; line-height: 1.5; color: #cbd5e1;">
                Click "Fetch AI Signal" to request live analysis.
            </div>
        </div>
    </div>

    <button class="btn" onclick="fetchSignal()">Fetch AI Signal</button>
</div>

<script>
    async function fetchSignal() {
        const loadingElement = document.getElementById('loading');
        const dashboardElement = document.getElementById('dashboard');
        
        loadingElement.style.display = 'block';
        dashboardElement.style.opacity = '0.5';

        try {
            const response = await fetch('https://titan-backend-on94.onrender.com/api/ai-analysis');
            const data = await response.json();

            document.getElementById('asset').innerText = data.asset || "---";
            document.getElementById('event').innerText = data.event || "---";
            document.getElementById('time').innerText = data.time || "---"; // এখানে টাইম সেট হবে
            document.getElementById('direction').innerText = data.direction || "---";
            document.getElementById('confidence').innerText = data.confidence || "---";
            document.getElementById('insight').innerText = data.insight || "---";

            const dirText = data.direction || "";
            if(dirText.includes("SELL")) {
                document.getElementById('direction').style.color = "#ff1744";
            } else if(dirText.includes("BUY")) {
                document.getElementById('direction').style.color = "#00e676";
            } else {
                document.getElementById('direction').style.color = "#ffb300";
            }

        } catch (error) {
            alert('Error fetching market data. Please try again.');
            console.error(error);
        } finally {
            loadingElement.style.display = 'none';
            dashboardElement.style.opacity = '1';
        }
    }
</script>

</body>
</html>
