<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unick Trader AI | Live Market News</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e14; color: #ffffff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #151a26; border-radius: 12px; padding: 25px; width: 100%; max-width: 500px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #262f45; text-align: center; }
        h1 { font-size: 22px; margin-bottom: 5px; color: #00e676; text-transform: uppercase; }
        .subtitle { font-size: 11px; color: #8a96a3; margin-bottom: 20px; }
        .password-input { width: 90%; padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid #262f45; background-color: #0b0e14; color: #fff; text-align: center; margin-bottom: 15px; }
        .card { background: #1c2434; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #00e676; text-align: left; }
        .label { font-size: 10px; color: #8a96a3; text-transform: uppercase; margin-top: 8px; }
        .value { font-size: 15px; font-weight: bold; margin-bottom: 3px; }
        .signal { font-size: 20px; font-weight: 800; color: #00e676; }
        .btn { background-color: #00e676; color: #000; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; }
        .chart-container { width: 100%; height: 250px; margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 1px solid #262f45; }
    </style>
</head>
<body>

<div class="container">
    <h1>Unick Trader AI</h1>
    <div class="subtitle">OFFICIAL MARKET ANALYSIS ENGINE</div>

    <div id="login-screen">
        <input type="password" id="site-password" class="password-input" placeholder="Enter Password...">
        <button class="btn" onclick="checkPassword()">Unlock Dashboard</button>
    </div>

    <div id="main-content" style="display: none;">
        <div class="chart-container"><div id="tradingview_chart" style="width:100%; height:100%;"></div></div>
        
        <div id="dashboard" class="card">
            <div class="label">Target Asset</div>
            <div id="asset" class="value">---</div>
            <div class="label">Economic Event</div>
            <div id="event" class="value">---</div>
            <div class="label">Schedule</div>
            <div id="time" class="value" style="color: #2979ff;">---</div>
            <div class="label">AI Direction</div>
            <div id="direction" class="signal">---</div>
            <div class="label">Probability</div>
            <div id="confidence" class="value" style="color: #ffb300;">---</div>
        </div>
        <button class="btn" onclick="fetchSignal()">Analyze Live News</button>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let sessionPassword = "";
    
    function loadChart(symbol = "FX:EURUSD") {
        new TradingView.widget({"width": "100%", "height": "100%", "symbol": symbol, "interval": "1", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en", "hide_side_toolbar": true, "container_id": "tradingview_chart"});
    }

    async function checkPassword() {
        const pass = document.getElementById('site-password').value;
        const res = await fetch('https://titan-backend-on94.onrender.com/api/verify-pass', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: pass})
        });
        const data = await res.json();
        if(data.status === "success") {
            sessionPassword = pass;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadChart();
        } else { alert("Incorrect Password"); }
    }

    async function fetchSignal() {
        const res = await fetch('https://titan-backend-on94.onrender.com/api/ai-analysis', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: sessionPassword})
        });
        const data = await res.json();
        
        document.getElementById('asset').innerText = data.asset || "---";
        document.getElementById('event').innerText = data.event || "---";
        document.getElementById('time').innerText = data.time || "---";
        document.getElementById('direction').innerText = data.direction || "---";
        document.getElementById('confidence').innerText = data.confidence || "---";

        if(data.asset && data.asset !== "NO LIVE NEWS") {
            loadChart("FX:" + data.asset.replace("/", ""));
        } else {
            loadChart("FX:EURUSD");
        }
        
        const dir = document.getElementById('direction');
        dir.style.color = data.direction?.includes("SELL") ? "#ff1744" : (data.direction?.includes("BUY") ? "#00e676" : "#ffb300");
    }
</script>
</body>
</html>
