<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neo Titan XO AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

background:#0b1220;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;

}

.container{

width:100%;
max-width:520px;
background:#141c2b;
border-radius:18px;
padding:25px;
box-shadow:0 0 25px rgba(0,255,170,.15);

}

h1{

text-align:center;
color:#00ff9d;
font-size:28px;

}

.subtitle{

text-align:center;
color:#9ca3af;
margin-top:5px;
margin-bottom:25px;
font-size:13px;

}

.login-box{

background:#1d2638;
padding:20px;
border-radius:12px;

}

input{

width:100%;
padding:13px;
background:#0b1220;
border:1px solid #2b3752;
color:white;
border-radius:8px;
margin-top:15px;
margin-bottom:15px;
font-size:15px;

}

input:focus{

outline:none;
border-color:#00ff9d;

}

button{

width:100%;
padding:13px;
background:#00ff9d;
color:#000;
font-weight:bold;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#00d181;

}

#error{

display:none;
color:#ff5252;
font-size:13px;
margin-bottom:10px;

}

#dashboard{

display:none;

}

.card{

background:#1d2638;
padding:15px;
border-radius:12px;
margin-top:15px;

}

.label{

color:#94a3b8;
font-size:12px;
margin-top:10px;

}

.value{

font-size:16px;
font-weight:bold;
margin-top:3px;

}

.signal{

font-size:24px;
font-weight:bold;
color:#00ff9d;

}

#timer{

margin-top:15px;
text-align:center;
color:#4fc3f7;
font-weight:bold;

}

.chart{

height:250px;
margin-top:15px;
border-radius:12px;
overflow:hidden;

}

.loading{

display:none;
text-align:center;
color:#00ff9d;
margin-top:15px;

}

</style>

</head>

<body>

<div class="container">

<h1>Neo Titan XO</h1>

<div class="subtitle">

LIVE FOREX NEWS AI

</div>

<div id="login" class="login-box">

<div>

Enter Password

</div>

<input
type="password"
id="password"
placeholder="Password">

<div id="error">

Wrong Password

</div>

<button onclick="login()">

Unlock Dashboard

</button>

</div>

<div id="dashboard">
<div id="timer">

Waiting for Live News...

</div>

<div class="loading" id="loading">

Connecting to Server...

</div>

<div class="chart">

<div id="tv_chart" style="width:100%;height:100%;"></div>

</div>

<div class="card">

<div class="label">

Target Asset

</div>

<div class="value" id="asset">

---

</div>

<div class="label">

Economic Event

</div>

<div class="value" id="event">

---

</div>

<div class="label">

News Time

</div>

<div class="value" id="time">

---

</div>

<div class="label">

AI Direction

</div>

<div class="signal" id="direction">

---

</div>

<div class="label">

Confidence

</div>

<div class="value" id="confidence">

---

</div>

</div>

<div class="card">

<div class="label">

AI Insight

</div>

<div
class="value"
id="insight"
style="font-size:14px;font-weight:normal;line-height:1.6;">

Waiting...

</div>

</div>

<button
style="margin-top:18px"
onclick="fetchSignal()">

Analyze Live News

</button>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

const API="https://titan-backend-on94.onrender.com";

let password="";

let timer;

function loadChart(symbol="FX:EURUSD"){

document.getElementById("tv_chart").innerHTML="";

new TradingView.widget({

container_id:"tv_chart",

symbol:symbol,

interval:"1",

theme:"dark",

style:"1",

locale:"en",

width:"100%",

height:"100%",

hide_side_toolbar:true,

allow_symbol_change:false

});

}

async function login(){

const pass=document.getElementById("password").value;

const res=await fetch(API+"/api/verify-pass",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

password:pass

})

});

const data=await res.json();

if(data.status=="success"){

password=pass;

document.getElementById("login").style.display="none";

document.getElementById("dashboard").style.display="block";

loadChart();

}else{

document.getElementById("error").style.display="block";

}

}
async function fetchSignal(){

if(password==""){
alert("Please Login First");
return;
}

document.getElementById("loading").style.display="block";

try{

const res=await fetch(API+"/api/ai-analysis",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
password:password
})

});

const data=await res.json();

document.getElementById("loading").style.display="none";

if(data.error){

alert(data.error);
return;

}

document.getElementById("asset").innerText=data.asset;
document.getElementById("event").innerText=data.event;
document.getElementById("time").innerText=data.time;
document.getElementById("direction").innerText=data.direction;
document.getElementById("confidence").innerText=data.confidence;
document.getElementById("insight").innerText=data.insight;

if(data.asset!="NO LIVE NEWS" && data.asset!="SERVER ERROR"){

const symbol="FX:"+data.asset.replace("/","");

loadChart(symbol);

}else{

loadChart("FX:EURUSD");

}

startTimer(data.raw_time);

}catch(err){

document.getElementById("loading").style.display="none";

alert("Server Error");

}

}

function startTimer(rawTime){

clearInterval(timer);

const timerBox=document.getElementById("timer");

if(!rawTime || rawTime=="N/A"){

timerBox.innerText="No Scheduled News";
return;

}

timerBox.innerText="Next News : "+rawTime;

}

setInterval(function(){

if(password!=""){

fetchSignal();

}

},60000);

</script>

</body>

</html>
