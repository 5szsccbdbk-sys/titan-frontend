<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO TITAN XO | Live BTC Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
body{
background:#050816;
background-image:
radial-gradient(circle at top,#00ffc322 0%,transparent 45%),
radial-gradient(circle at bottom,#0099ff22 0%,transparent 40%);
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}
.card{
width:100%;
max-width:650px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:25px;
padding:25px;
box-shadow:0 0 30px rgba(0,255,200,.25);
}
.logo{
text-align:center;
font-size:32px;
font-weight:700;
color:#00ffd0;
}
.sub{
text-align:center;
margin-top:5px;
color:#aaa;
margin-bottom:20px;
}
.price{
text-align:center;
font-size:42px;
font-weight:bold;
color:#00ff88;
margin-bottom:25px;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
.item{
background:rgba(255,255,255,.05);
padding:15px;
border-radius:15px;
border:1px solid rgba(255,255,255,.08);
}
.label{
font-size:13px;
color:#aaa;
}
.value{
font-size:22px;
font-weight:bold;
margin-top:6px;
}
.signal{
margin-top:25px;
padding:18px;
border-radius:18px;
text-align:center;
font-size:34px;
font-weight:bold;
}
.buy{
background:#00c853;
}
.sell{
background:#d50000;
}
.wait{
background:#ff9800;
}
.score{
text-align:center;
margin-top:15px;
font-size:22px;
color:#00ffd5;
}
.footer{
text-align:center;
margin-top:20px;
color:#888;
font-size:14px;
}
@media(max-width:600px){
.grid{
grid-template-columns:1fr;
}
.price{
font-size:34px;
}
}
</style>
</head>
<body>
<div class="card">
<div class="logo">⚡ NEO TITAN XO</div>
<div class="sub">Professional Crypto Analysis</div>
<div class="price" id="price">Loading...</div>
<div class="grid">
<div class="item">
<div class="label">RSI</div>
<div class="value" id="rsi">-</div>
</div>
<div class="item">
<div class="label">EMA 9</div>
<div class="value" id="ema9">-</div>
</div>
<div class="item">
<div class="label">EMA 21</div>
<div class="value" id="ema21">-</div>
</div>
<div class="item">
<div class="label">MACD</div>
<div class="value" id="macd">-</div>
</div>
<div class="item">
<div class="label">MACD Signal</div>
<div class="value" id="macdSignal">-</div>
</div>
<div class="item">
<div class="label">ATR</div>
<div class="value" id="atr">-</div>
</div>
<div class="item">
<div class="label">BB Upper</div>
<div class="value" id="bbUpper">-</div>
</div>
<div class="item">
<div class="label">BB Lower</div>
<div class="value" id="bbLower">-</div>
</div>
</div>
<div id="signal" class="signal wait">WAIT</div>
<div class="score">
Score : <span id="score">0</span>
</div>
<div class="footer">
🟢 Auto Refresh Every 5 Seconds
</div>
</div>
<script>
async function loadAnalysis(){
try{
const res=await fetch("/api/analysis");
const data=await res.json();
price.innerHTML="$"+data.Price;
rsi.innerHTML=data.Indicators.RSI;
ema9.innerHTML=data.Indicators.EMA9;
ema21.innerHTML=data.Indicators.EMA21;
macd.innerHTML=data.Indicators.MACD;
macdSignal.innerHTML=data.Indicators.MACD_SIGNAL;
atr.innerHTML=data.Indicators.ATR;
bbUpper.innerHTML=data.Indicators.BB_UPPER;
bbLower.innerHTML=data.Indicators.BB_LOWER;
score.innerHTML=data.Score;
signal.innerHTML=data.Signal;
signal.className="signal";
if(data.Signal=="BUY"){
signal.classList.add("buy");
}
else if(data.Signal=="SELL"){
signal.classList.add("sell");
}
else{
signal.classList.add("wait");
}
}
catch(e){
price.innerHTML="API ERROR";
}
}
loadAnalysis();
setInterval(loadAnalysis,5000);
</script>
</body>
</html>
